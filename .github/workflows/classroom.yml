name: Autograding Tests
on:
  - push
  - workflow_dispatch
  - repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    # 1. BƯỚC CHẠY TEST (Đã bỏ các dấu # để kích hoạt)
    - name: Run tests
      uses: classroom-resources/autograding-io-grader@v1
      id: addition-test  # <-- ID này rất quan trọng
      with:
        test-name: Addition Test
        command: "./bin/add.sh"  # <-- Thay thế bằng lệnh chạy file code của bạn (VD: python main.py, node index.js...)
        input: 1 2
        expected-output: 3
        comparison-method: exact
        timeout: 10
        
    # 2. BƯỚC BÁO CÁO KẾT QUẢ (Đã thêm env và runners)
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        # Cấu trúc: [ID_VIẾT_HOA]_RESULTS
        ADDITION-TEST_RESULTS: "${{ steps.addition-test.outputs.result }}"
      with:
        runners: addition-test # <-- Khai báo runners bằng chuỗi string khớp với ID ở bước trên
